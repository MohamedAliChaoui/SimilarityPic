# Configuration de la base de données H2 en mémoire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Configuration JPA
spring.jpa.show-sql=true

# Configuration des uploads pour les tests
image.upload.dir=./test-uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Désactiver les logs trop verbeux pendant les tests
logging.level.root=WARN
logging.level.pdl.backend=INFO
logging.level.org.hibernate=ERROR 