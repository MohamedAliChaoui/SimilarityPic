spring.application.name=backend
server.port=8001
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Configuration base de données avec paramètres de persistance
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:similaritypic}?prepareThreshold=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuration JPA pour assurer la persistance des données
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.type.preferred_binary_subtype=BINARY
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Configuration du pool de connexions pour améliorer la stabilité
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Configuration des timeouts du serveur
server.port=8001
server.tomcat.connection-timeout=120000
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
spring.mvc.async.request-timeout=120000

# Configuration CORS avec timeouts étendus
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Configuration Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true

# Configuration de la sécurité
jwt.secret=your-secret-key-here
jwt.expiration=86400000

# Configuration du stockage des images
image.upload.dir=./uploads
image.max-size=10485760
image.allowed-types=jpg,jpeg,png


